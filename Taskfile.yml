version: '3'

env:
  PUID:
    sh: id -u
  PGID:
    sh: id -g
  
dotenv: ['.env']
  
tasks:
  hello:
    desc: Hello world task
    cmds:
      - echo 'Hello World from Task!'
    silent: true

  list:
    desc: List all tasks
    cmds:
    - task --list
    silent: true

  build:
    desc: Build Firecracker rootfs image
    dir: rootfs
    preconditions:
      - test -f build.sh
    silent: true
    requires:
      vars: [ IMAGE, VERSION ]
    cmds:
    - pwd
    - "[ -d output ] || mkdir output"
    - chmod +x build.sh
    - "./build.sh {{ .IMAGE }} {{ .VERSION }}"

  test:
    desc: Test Firecracker image (no persistence/network)
    dir: rootfs
    preconditions:
      - test -f config.json
    silent: true
    requires:
      vars: [ IMAGE, VERSION ]
    cmds:
    - sed -i "s:output/.*\.img:output/{{ .IMAGE }}-{{ .VERSION }}.img:g" config.json
    - firecracker --no-api --config-file config.json

  deploy:
    desc: Deploy Firecracker squashfs image to server
    dir: rootfs/output
    silent: true
    requires:
      vars: [ IMAGE, VERSION ]
    preconditions:
      - test -f {{ .IMAGE }}-{{ .VERSION }}.img
    cmds:
    - sudo umount /mnt/firecracker || true
    - sudo rm -rf /mnt/firecracker
    - sudo mkdir -p /mnt/firecracker
    - sudo mount -t cifs -o guest //firecracker/rootfs /mnt/firecracker
    - sudo cp -f {{ .IMAGE }}-{{ .VERSION }}.img /mnt/firecracker/

  b-t:
    desc: Build and test Firecracker image
    aliases:
      - build-test
      - bt
    silent: true
    requires:
      vars: [ IMAGE, VERSION ]
    cmds:
    - task: build
      vars: { IMAGE: '{{ .IMAGE }}', VERSION: '{{ .VERSION }}' }
    - task: test
      vars: { IMAGE: '{{ .IMAGE }}', VERSION: '{{ .VERSION }}' }

  b-t-d:
    desc: Build, test and deploy Firecracker image
    aliases:
      - build-test-deploy
      - btd
    silent: true
    requires:
      vars: [ IMAGE, VERSION ]
    cmds:
    - task: build
      vars: { IMAGE: '{{ .IMAGE }}', VERSION: '{{ .VERSION }}' }
    - task: test
      vars: { IMAGE: '{{ .IMAGE }}', VERSION: '{{ .VERSION }}' }
    - task: deploy
      vars: { IMAGE: '{{ .IMAGE }}', VERSION: '{{ .VERSION }}' }

  b-d:
    aliases:
      - build-deploy
      - bd
    desc: Build and deploy Firecracker image
    silent: true
    requires:
      vars: [ IMAGE, VERSION ]
    cmds:
    - task: build
      vars: { IMAGE: '{{ .IMAGE }}', VERSION: '{{ .VERSION }}' }
    - task: deploy
      vars: { IMAGE: '{{ .IMAGE }}', VERSION: '{{ .VERSION }}' }

  talos:
    desc: Obtain Talos images for Firecracker and deploy to server
    silent: true
    requires:
      vars: [ VERSION ]
    vars:
      RELEASE:
        sh: gh api 'repos/siderolabs/talos/releases?per_page=100' --jq '[ .[] | select(.prerelease or .draft | not) | .tag_name[1:100] | select(contains("-") | not) | select(startswith("{{ .VERSION }}")) ] | .[0]'
    cmds:
    - echo "Using version {{ .RELEASE }}"
    - rm -rf talos
    - echo "Cloning Talos source code"
    - git clone --depth=1 -b v{{ .RELEASE }} https://github.com/siderolabs/talos.git && echo "cloned"
    - | 
        cd talos
        pwd
        echo "Building Talos"
        make initramfs kernel
        extract-vmlinux _out/vmlinuz-amd64 > _out/vmlinux-amd64
    - echo "Deploying initramfs to server"
    - sudo umount /mnt/firecracker || true
    - sudo rm -rf /mnt/firecracker
    - sudo mkdir -p /mnt/firecracker
    - sudo mount -t cifs -o guest //firecracker/rootfs /mnt/firecracker
    - sudo cp -f talos/_out/initramfs-amd64.xz /mnt/firecracker/talos-{{ .VERSION }}.xz
    - sudo umount /mnt/firecracker || true
    - echo "Deploying kernel to server"
    - sudo mount -t cifs -o guest //firecracker/kernel /mnt/firecracker
    - sudo cp -f talos/_out/vmlinux-amd64 /mnt/firecracker/vmlinux-talos-{{ .VERSION }}.bin
    - sudo umount /mnt/firecracker || true


